<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hawkking: Be the Explorer!</title>
  <link rel="stylesheet" href="sidepanel.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&display=swap" rel="stylesheet">

</head>
<body>
  <div class="container">
    <!-- Upon Installation, asking for Gemini API Key -->
    <div id="setup-view" class="card hidden">
      <h3 class="heading">Enter your Gemini API key</h3>
      <p class="api-link"><a href="https://aistudio.google.com/api-keys?project=gen-lang-client-0555247765" target="_blank">Get your key</a></p>
      <input type="password" id="api-key-input" placeholder="AIzaSy..." />
      <button id="save-key-btn" style="margin-top: 10px;">Save API Key</button>
    </div>
    <!-- Setup-View card ends -->

    <!-- Main-view, where user could search its query -->
    <div id="main-view" class="hidden">
      <div class="bottoms">
        <textarea type="text" placeholder="Search your query here..." class="query-bar"></textarea>
      </div>
    </div>
    <!-- Main-view ends here -->

  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
